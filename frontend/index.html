<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <title>Concept Art Studio</title>
    <script>
      window.__onGenerateProgress = function (step, total) {
        window.dispatchEvent(new CustomEvent("generate-progress", { detail: { step, total } }));
      };
      window.__onDownloadProgress = function (downloaded, total) {
        window.dispatchEvent(new CustomEvent("download-progress", { detail: { downloaded, total } }));
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
